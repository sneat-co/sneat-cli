name: Go CI

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching v*, i.e. v20.15.10
    paths:
      - '.github/workflows/**.yml'
      - '**/go.*'
      - '**/*.go'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/**.yml'
      - '**/go.*'
      - '**/*.go'

jobs:

  strongo_workflow:
    uses: strongo/go-ci-action/.github/workflows/workflow.yml@main
    permissions:
      contents: write
    secrets:
      # Org token with read access to private sneat-co repos — required for
      # GOPRIVATE module fetches (same pattern as sneat-go ci.yml).
      GH_TOKEN: ${{ secrets.SNEAT_CI_READWRITE_TOKEN }}
    #      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
    with:
      GOPRIVATE: github.com/sneat-co
      code_coverage: true
